<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forgive Me?</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: Arial;
  overflow:hidden;
}

#no {
  position: fixed;
  left: 55%;
  top: 55%;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
}

#yes {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
}

.box {
  text-align:center;
}
</style>
</head>

<body>

<div class="box" id="box">
  <h1>🐶 Will you forgive me?</h1>
  <button id="yes">Yes 💖</button>
  <button id="no">No 😡</button>
</div>

<script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const box = document.getElementById("box");

// FORCE TEST (very important)
console.log("JS is working");

no.onmouseenter = function () {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 60);
  no.style.left = x + "px";
  no.style.top = y + "px";
};

yes.onclick = function () {
  box.innerHTML = 
    <h1>💖 Thank you 💖</h1>
    <p style="max-width:500px;margin:auto;line-height:1.8">
      YOU forgave me 😼<br><br>
      I owe you 7,483 forehead kisses.
    </p>
  ;
};
</script>

</body>
</html>
