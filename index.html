<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgive Me?</title>

<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Comic Neue', cursive;
  background: linear-gradient(135deg, #ffffff, #f2f2f2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  text-align: center;
}

.container {
  max-width: 600px;
}

h1 { font-size: 28px; }

.dog { font-size: 80px; }

button {
  padding: 12px 18px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

#yes { background: black; color: white; }

#no {
  background: #eee;
  position: absolute;
}

.heart, .kiss {
  position: absolute;
}

.heart { color: hotpink; animation: float 4s linear forwards; }
.kiss { animation: fall 3s linear forwards; }

@keyframes float {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-100vh); opacity: 0; }
}

@keyframes fall {
  from { transform: translateY(-10vh); opacity: 1; }
  to { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container" id="main">
  <div class="dog" id="dog">🐶😭</div>
  <h1>Will you forgive me?</h1>

  <button id="yes">Yes 💖</button>
  <button id="no">No 😡</button>
</div>

<script>
window.onload = () => {

  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");
  const dog = document.getElementById("dog");

  // No runaway
  noBtn.addEventListener("mouseover", () => {
    noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
    noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
  });

  // YES click
  yesBtn.addEventListener("click", () => {

    document.getElementById("main").innerHTML = 
      <h1>💖 Thank you 💖</h1>
      <p style="max-width:600px; margin:auto; line-height:1.8;">
        ...Wait.<br><br>

        YOU ACTUALLY FORGAVE ME?!<br><br>

        Hehehe... I knew you'd soften 😼<br><br>

        You're my favorite person ♡
      </p>
    ;

    setInterval(createHeart, 300);
    setInterval(createKiss, 200);
  });

  function createHeart() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerText = "💗";
    h.style.left = Math.random() * window.innerWidth + "px";
    h.style.top = "100vh";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
  }

  function createKiss() {
    const k = document.createElement("div");
    k.className = "kiss";
    k.innerText = "💋";
    k.style.left = Math.random() * window.innerWidth + "px";
    k.style.top = "-20px";
    document.body.appendChild(k);
    setTimeout(() => k.remove(), 3000);
  }

};
</script>

</body>
</html>
