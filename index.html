<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forgive Me?</title>

<link href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Comic Neue', cursive;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#fff;
  overflow:hidden;
}

.screen {
  text-align:center;
}

button {
  padding:12px 18px;
  margin:10px;
  border-radius:12px;
  border:none;
  cursor:pointer;
}

#yes { background:black; color:white; }

#no {
  position:absolute;
  background:#eee;
}

.heart, .kiss {
  position:absolute;
}
</style>
</head>

<body>

<div class="screen" id="screen1">
  <h1>🐶 Will you forgive me?</h1>
  <button id="yes">Yes 💖</button>
  <button id="no">No 😡</button>
</div>

<script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const screen = document.getElementById("screen1");

// FIXED runaway
no.addEventListener("mouseover", () => {
  no.style.left = Math.random()*(window.innerWidth-100)+"px";
  no.style.top = Math.random()*(window.innerHeight-50)+"px";
});

// YES
yes.onclick = () => {
  screen.innerHTML = 
    <h1>💖 You forgave me 💖</h1>
    <p style="max-width:500px; line-height:1.8;">
      ...Wait.<br><br>
      YOU ACTUALLY DID IT?! 😼<br><br>
      You're my favorite person ♡
    </p>
  ;
};
</script>

</body>
</html>
